# .github/workflows/deploy.yml
name: 🚀 Deploy to VPS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: # Allow manual trigger

# Prevent concurrent deployments
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────
  # 1. BUILD & TEST (Runs on GitHub Runner)
  # ─────────────────────────────────────────
  build:
    name: 🔨 Build & Test
    runs-on: ubuntu-latest
    outputs:
      build-success: ${{ steps.build-check.outputs.success }}
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🟢 Setup Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: |
          npm install
          cd backend && npm install

      - name: 🏗️ Build Next.js frontend
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://grocerynowstore.com
          NEXT_PUBLIC_API_URL: /api

      - name: ✅ Build verification
        id: build-check
        run: |
          if [ -d ".next" ] && [ -f "backend/index.js" ]; then
            echo "success=true" >> $GITHUB_OUTPUT
            echo "✅ Build successful"
          else
            echo "❌ Build failed - missing artifacts"
            exit 1
          fi

  # ─────────────────────────────────────────
  # 2. DEPLOY TO VPS (Only on push to main)
  # ─────────────────────────────────────────
  deploy:
    name: 📤 Deploy to VPS
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.build.outputs.build-success == 'true'
    environment: production
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔑 Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: 📁 Sync files to VPS (exclude sensitive files)
        run: |
          rsync -avz --delete \
            --exclude='.git/' \
            --exclude='node_modules/' \
            --exclude='.next/' \
            --exclude='backend/node_modules/' \
            --exclude='.env' \
            --exclude='.env.local' \
            --exclude='*.log' \
            --exclude='.github/' \
            --exclude='.gitignore' \
            --exclude='deploy.sh' \
            --exclude='deploy.bat' \
            -e "ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30" \
            ./ root@${{ secrets.VPS_HOST }}:/var/www/grocerynow/
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}

      - name: 🔄 Install dependencies on VPS
        run: |
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 root@${{ secrets.VPS_HOST }} << 'EOF'
            set -e
            cd /var/www/grocerynow
            
            # Install backend dependencies
            cd backend && npm install && cd ..
            
            # Install frontend dependencies
            npm install
          EOF

      - name: 🏗️ Rebuild frontend on VPS
        run: |
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 root@${{ secrets.VPS_HOST }} << 'EOF'
            set -e
            cd /var/www/grocerynow
            
            # Build with environment variables
            export NEXT_PUBLIC_SITE_URL=https://grocerynowstore.com
            export NEXT_PUBLIC_API_URL=/api
            npm run build
          EOF

      - name: 🔄 Restart services with PM2
        run: |
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 root@${{ secrets.VPS_HOST }} << 'EOF'
            set -e
            cd /var/www/grocerynow
            
            # Restart backend
            cd backend && pm2 restart backend || pm2 start index.js --name backend
            cd ..
            
            # Restart frontend
            pm2 restart frontend || pm2 start npm --name frontend -- start
            
            # Save PM2 config
            pm2 save
            
            # Wait for services to be ready
            sleep 5
            
            # Health check
            if curl -s http://localhost:3000 | grep -q "Grocery" && \
               curl -s http://localhost:4000/ | grep -q "running"; then
              echo "✅ Services healthy"
            else
              echo "⚠️ Services may need attention"
              pm2 status
              exit 0  # Don't fail deployment for health check
            fi
          EOF

      - name: 🔄 Reload Nginx
        run: |
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 root@${{ secrets.VPS_HOST }} << 'EOF'
            nginx -t && systemctl reload nginx
            echo "✅ Nginx reloaded"
          EOF

      - name: 🎉 Deployment complete
        run: |
          echo "✅ Deployed to https://grocerynowstore.com"
          echo "🔗 Commit: ${{ github.sha }}"
          echo "👤 Triggered by: ${{ github.actor }}"

  # ─────────────────────────────────────────
  # 3. NOTIFY (Optional - Slack/Discord)
  # ─────────────────────────────────────────
  notify:
    name: 🔔 Notify
    runs-on: ubuntu-latest
    needs: [build, deploy]
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: 📧 Send deployment notification
        if: github.ref == 'refs/heads/main'
        run: |
          STATUS="${{ needs.deploy.result }}"
          MESSAGE="🚀 GroceryNow Deploy $STATUS"
          echo "$MESSAGE - Commit: ${{ github.sha }}"
          # Add Slack/Discord webhook here if desired:
          # curl -X POST -H 'Content-type: application/json' \
          #   --data "{\"text\":\"$MESSAGE\"}" \
          #   ${{ secrets.SLACK_WEBHOOK }}